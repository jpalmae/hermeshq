slug: voice-edge
name: Voice (Edge TTS)
description: Local speech-to-text with faster-whisper plus Spanish and English text-to-speech via edge-tts.
version: "0.1.0"
standard_compatible: true
supported_profiles:
  - standard
  - technical
  - security
required_fields: []
fields:
  - name: stt_enabled
    label: Enable speech-to-text
    kind: boolean
    options:
      - "true"
      - "false"
  - name: stt_model
    label: Whisper model
    kind: select
    options:
      - tiny
      - base
      - small
      - medium
      - large-v3
  - name: stt_language
    label: STT language
    kind: select
    options:
      - auto
      - es
      - en
  - name: voice_locale
    label: Voice preset
    kind: select
    options:
      - es
      - en
      - custom
  - name: tts_enabled
    label: Enable text-to-speech
    kind: boolean
    options:
      - "true"
      - "false"
  - name: tts_voice
    label: Edge TTS voice
    kind: select
    options:
      - es-MX-JorgeNeural
      - es-AR-TomasNeural
      - es-ES-AlvaroNeural
      - es-CO-GonzaloNeural
      - en-US-GuyNeural
      - en-US-ChristopherNeural
      - en-GB-RyanNeural
defaults:
  stt_enabled: "true"
  stt_model: small
  stt_language: es
  voice_locale: es
  tts_enabled: "true"
  tts_voice: es-MX-JorgeNeural
test_action: health
env_map: {}
